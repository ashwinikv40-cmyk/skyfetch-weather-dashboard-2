<!DOCTYPE html>
<html>
<head>
    <title>SkyFetch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SkyFetch Weather Dashboard</h1>

    <div class="search-section">
    <input type="text" id="city-input" placeholder="Enter city name..." />
    <button id="search-btn">🔍 Search</button>
</div>

<div id="recent-searches-section" class="recent-searches-section" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h4>Recent Searches</h4>
        <button id="clear-history-btn" class="clear-history-btn">Clear</button>
    </div>

    <div id="recent-searches-container"></div>
</div>

    <div id="weather-container">
        <h2 id="city"></h2>
        <p id="temperature"></p>
        <p id="description"></p>
        <img id="icon" />
    </div>

    <!-- Axios Library -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Your JavaScript -->
    <script src="app.js"></script>

</body>
</html>
